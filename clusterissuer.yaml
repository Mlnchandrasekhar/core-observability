apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: chandra-cloudflare-letsencrypt
spec:
  acme:
    email: chandusurya0406@gmail.com

    # Let's Encrypt Production
    server: https://acme-v02.api.letsencrypt.org/directory

    privateKeySecretRef:
      name: chandra-cloudflare-letsencrypt-account-key

    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: chandra-cloudflare-api-token
              key: api-token
